version: "3"

tasks:
  default:
    cmds:
      - task --list

  hi:
    desc: "Run a test prompt"
    cmds:
      - uv run -m app.main -p "hi"

  run:
    aliases: ["r"]
    desc: "Run the Application"
    cmds:
      - uv run -m app.main -p {{.CLI_ARGS}}

  test:skill:
    desc: "Test local skill matching"
    vars:
      PROMPT: "bad-joke, flip a coin"
    cmds:
      - uv run -m app.main -p "{{.PROMPT}}"

  test:
    desc: "Test the Step"
    cmds:
      - task test:skill

  clear:
    desc: "Clear generated caches and build artifacts"
    cmds:
      - rm -rf build .pytest_cache app/__pycache__ mcp_servers/__pycache__
