version: '3'

tasks:
  default:
    cmds:
      - task --list-all

  step1:
    desc: Step 1 Introduction to Triples
    cmds:
      - bun src/01_triples.ts

  step2:
    desc: Step 2 Basic SPARQL Queries
    cmds:
      - bun src/02_sparql.ts

  step3:
    desc: Step 3 CRUD Operations
    cmds:
      - bun src/03_crud.ts

  step4:
    desc: Step 4 Ontology and OWL basics
    cmds:
      - bun src/04_owl.ts

  dashboard:
    desc: Start the interactive Learning Path Dashboard
    cmds:
      - echo Opening dashboard at http://localhost:3000
      - bun run src/server.ts
