<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevTools + Puppeteer Bug Hunt</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <section class="card">
        <p class="eyebrow">Learning lab</p>
        <h1>Buggy coffee cart</h1>
        <p>
          Add coffees to the cart. The UI has one intentional bug for you to
          investigate with Chrome DevTools MCP and Puppeteer.
        </p>

        <div class="product" aria-label="Coffee product">
          <div>
            <h2>Espresso</h2>
            <p>$3 each</p>
          </div>
          <button id="add-coffee" type="button">Add coffee</button>
        </div>

        <dl class="totals">
          <div>
            <dt>Quantity</dt>
            <dd id="quantity">0</dd>
          </div>
          <div>
            <dt>Total</dt>
            <dd id="total">$0</dd>
          </div>
        </dl>

        <p id="status" role="status" aria-live="polite">Cart is empty.</p>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
