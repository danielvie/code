version: '3'


vars:
  EXE: '{{if eq OS "windows"}}.exe{{else}}{{end}}'
  FLATC: './bin/flatc{{.EXE}}'
  FLATC_OS: '{{if eq OS "windows"}}Windows{{else if eq OS "darwin"}}Mac{{else}}Linux{{end}}'
  FLATC_URL: 'https://github.com/google/flatbuffers/releases/download/v25.12.19-2026-02-06-03fffb2/{{.FLATC_OS}}.flatc.binary.zip'
  SCHEMA_FILE: './schema/simulation.fbs'

tasks:
  default:
    cmds:
      - task --list

  build-schemas:
    desc: "Compile FlatBuffers schemas for TypeScript (frontend) and Rust (backend)"
    cmds:
      - '{{if eq OS "windows"}}pwsh -Command "New-Item -ItemType Directory -Force -Path frontend/src/generated"{{else}}mkdir -p frontend/src/generated{{end}}'
      - '{{if eq OS "windows"}}pwsh -Command "New-Item -ItemType Directory -Force -Path backend/src/generated"{{else}}mkdir -p backend/src/generated{{end}}'
      # Generate TS for FlatBuffers (frontend)
      - '{{.FLATC}} --ts -o frontend/src/generated {{.SCHEMA_FILE}}'
      # Generate Rust for FlatBuffers (backend)
      - '{{.FLATC}} --rust -o backend/src/generated {{.SCHEMA_FILE}}'

  setup-flatc:
    desc: "Download and extract the official flatc for the current OS"
    cmds:
      - '{{if eq OS "windows"}}pwsh -Command "Invoke-WebRequest -Uri {{.FLATC_URL}} -OutFile flatc.zip"{{else}}curl -L {{.FLATC_URL}} -o flatc.zip{{end}}'
      - '{{if eq OS "windows"}}pwsh -Command "Expand-Archive -Path flatc.zip -DestinationPath bin -Force"{{else}}mkdir -p bin && unzip -o flatc.zip -d bin && chmod +x {{.FLATC}}{{end}}'
      - '{{if eq OS "windows"}}pwsh -Command "Remove-Item flatc.zip"{{else}}rm flatc.zip{{end}}'
    status:
      - test -f '{{.FLATC}}'

  front:install:
    desc: "Install frontend dependencies and ensure flatc is present"
    deps: [setup-flatc]
    dir: "frontend"
    cmds:
      - bun install

  back:build:
    desc: "Build the Rust simulation server (release)"
    dir: "backend"
    cmds:
      - cargo build --release

  back:run:
    desc: "Run the Rust simulation server (debug)"
    dir: "backend"
    cmds:
      - cargo run --bin server

  back:run-release:
    desc: "Run the Rust simulation server (release)"
    dir: "backend"
    cmds:
      - cargo run --release --bin server

  front:run:
    desc: "Run the Vite frontend"
    dir: "frontend"
    cmds:
      - npm run dev

  front:agentation:
    desc: "Run the agentation server"
    cmds:
      - npx agentation-mcp server
      
  front:all:
    desc: "Run the Vite frontend + agentation"
    deps: [front:run, front:agentation]
    cmds:
      - npm run dev

  run:
    desc: "Build schemas then run both Rust backend and Vite frontend concurrently"
    deps: [build-schemas]
    cmds:
      - task: _run_concurrent
      
  runall:
    desc: "Build schemas then run both backend + frontend + agentation"
    deps: [build-schemas]
    cmds:
      - task: _run_concurrent_agentation

  _run_concurrent:
    internal: true
    deps: [back:run, front:run]
    
  _run_concurrent_agentation:
    internal: true
    deps: [back:run, front:run, front:agentation]
