"$schema" = 'https://starship.rs/config-schema.json'

format = """
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$username\
$python\
$java\
$nodejs\
$cmd_duration\
$battery\
$line_break\
$character"""

[username]
disabled = false
show_always = true
format = "[\uf007 $user]($style) "

[directory]
style = "fg:#3de1f3"
# format = "[ \u0001f4c1  $path ]($style)"
# format = "[рҹ–ҝ $path ]($style)"
format = "[$path ]($style)"

[battery]
full_symbol = 'рҹ”Ӣ '
charging_symbol = 'вҡЎ '
discharging_symbol = 'рҹӘ« '
format = "[\\($symbol$percentage\\)]($style)"

[[battery.display]]
threshold = 15
style = 'bold red'

[[battery.display]]
threshold = 40
style = 'bold yellow'

# [[battery.display]]
# threshold = 100
# style = 'green'

[character]
success_symbol = "[оҖҮ ](fg:#3de1f3)" # U+E007

error_symbol = "[вқҜ](red)"
vimcmd_symbol = "[вқ®](green)"

[git_branch]
format = "[$symbol$branch ]($style fg:#a3be8c)"

[git_status]
style = "bold fg:#a3be8c"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
ahead = "вҮЎ"
behind = "вҮЈ"
diverged = "вҮ•"
untracked = "?"
modified = "!"
staged = "+"
renamed = "В»"
deleted = "вңҳ"
stashed = ""

[git_state]
style = "bold fg:#a3be8c"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[cmd_duration]
format = "[ $duration]($style) "
style = "bold fg:#f3d97b"

[python]
format = "[\\[py $version( )\\]]($style)([ \\($virtualenv\\)]($style))"
style = "fg:#758199"

[java]
format = "[\\[java $version\\]]($style) "
style = "fg:#758199"

[nodejs]
format = "[\\[node $version\\]]($style) "
style = "fg:#758199"

# Useful Symbols
# оҖҮ U+E007   оҲү U+E209   оҲ  U+E220   оҲЁ U+E228   оҲӯ U+E22D  
# оҲ® U+E22E   оҲұ U+E231   оҲҙ U+E234   оҲё U+E238   оҲҝ U+E23F  
# оүғ U+E243   оү… U+E245   оүў U+E262   оҠў U+E2A2   оҠҰ U+E2A6  
# оҚ‘ U+E351   оҚӘ U+E36A   оҚ® U+E36E   оҺҝ U+E3BF   о—ҫ U+E5FE  
# о—ҝ U+E5FF   оҳ® U+E62E   оңҸ U+E70F   оң’ U+E712   оһә U+E7BA  
# оӘҒ U+EA81   оӯ„ U+EB44   пҒ  U+F060   пҒЎ U+F061   пҒў U+F062  
# пҒЈ U+F063   пҒӨ U+F064   пҒҘ U+F065   пҒҰ U+F066   пҒІ U+F072  
# пҒ» U+F07B   пҒј U+F07C   пӮҖ U+F080   пҮҳ U+F1D8   пҮҷ U+F1D9  
# пҮў U+F1E2   пүҖ U+F240   пүҒ U+F241   пүӮ U+F242   пүғ U+F243  
# пү„ U+F244   пҚҜ U+F36F   п’ү U+F489   п”Ұ U+F526
